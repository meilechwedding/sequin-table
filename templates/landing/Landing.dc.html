<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Sequin Landing" description="Noir luxe landing hero with foil headline, monogram header and CTAs" -->
<helmet>
<script src="./ds-base.js"></script>
<style>
  @keyframes sq-foil-move { to { background-position: 200% center; } }
</style>
</helmet>
<div style="min-height:100vh; background:radial-gradient(120% 140% at 20% 0%, #2a1f14 0%, #15100a 60%, #0e0a06 100%); font-family:'Jost', system-ui, sans-serif; color:#fbf6ec; display:flex; flex-direction:column;" data-theme="noir">

  <header style="display:flex; align-items:center; justify-content:space-between; padding:24px 40px;">
    <x-import component-from-global-scope="SequinDesignSystem_ec3cc5.Monogram" variant="lockup" size="32" hint-size="180px,40px"></x-import>
    <nav style="display:flex; gap:28px; font-size:12px; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:#b3a085;">
      <span>Party Rental</span>
      <span>Home Table Linen</span>
      <span>Our Story</span>
    </nav>
  </header>

  <main style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px 90px; max-width:880px; margin:0 auto;">
    <div style="font-size:12px; font-weight:500; letter-spacing:.3em; text-transform:uppercase; color:#e8d4a8; display:flex; align-items:center; gap:.7em; margin-bottom:26px;">
      <span style="width:24px; height:1px; background:currentColor; opacity:.6;"></span>
      Events &amp; Home · Brooklyn
      <span style="width:24px; height:1px; background:currentColor; opacity:.6;"></span>
    </div>

    <h1 style="font-family:'Jost', sans-serif; font-weight:300; font-size:clamp(2.8rem, 1.6rem + 4vw, 5.5rem); line-height:1.04; letter-spacing:.04em; margin:0 0 26px;">
      Upscale Table Linen<br>
      <span style="background:linear-gradient(135deg,#7c6230 0%,#c9a86a 22%,#f2e6cb 38%,#b5935a 52%,#e8d4a8 68%,#997844 86%,#d9bf86 100%); background-size:200% auto; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent; animation:sq-foil-move 6s linear infinite;">for Every Celebration</span>
    </h1>

    <p style="font-size:17px; line-height:1.65; color:rgba(255,250,240,.82); max-width:520px; margin:0 0 38px;">
      Bringing sophistication and style to every gathering — curated linens to rent for events and to
      own for the table you set at home.
    </p>

    <div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center;">
      <x-import component-from-global-scope="SequinDesignSystem_ec3cc5.Button" variant="primary" size="lg" hint-size="190px,52px">Explore Rentals</x-import>
      <x-import component-from-global-scope="SequinDesignSystem_ec3cc5.Button" variant="outline" size="lg" hint-size="160px,52px">Shop Home</x-import>
    </div>
  </main>
</div>

</x-dc>
</body>
</html>
