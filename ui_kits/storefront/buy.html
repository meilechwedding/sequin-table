<!-- @dsCard group="Storefront" viewport="1440x900" name="Buy — Sequin" subtitle="Home linen lane landing: hero and catalog" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Buy — Sequin Table Linen</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: #F7F2EA; }
  .sq-rv { opacity:0; transform:translateY(10px); transition:opacity 600ms cubic-bezier(.4,0,.2,1),transform 600ms cubic-bezier(.4,0,.2,1); }
  .sq-rv.sq-show { opacity:1; transform:translateY(0); }
  @media (prefers-reduced-motion:reduce){ .sq-rv{opacity:1;transform:none;transition:none;} }
  :focus-visible { outline: 1.5px solid #BE9A6E; outline-offset: 3px; }
  #sq-toast {
    position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(120%);
    z-index:120;background:#221A12;color:#FBF6EF;padding:13px 22px;
    border-radius:var(--radius-pill);box-shadow:var(--shadow-4);
    display:flex;align-items:center;gap:10px;font-size:13px;letter-spacing:.04em;
    border:1px solid rgba(216,180,132,.55);transition:transform .45s cubic-bezier(.4,0,.2,1);
  }
  #sq-toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Catalog.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="CartDrawer.jsx"></script>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const priceNum = s => parseInt(String(s).replace(/[^0-9]/g,""),10)||0;

  function BuyHero() {
    const ref = useRef(null);
    useEffect(() => {
      if (!ref.current) return;
      const obs = new IntersectionObserver(entries=>{
        entries.forEach(e=>{
          if(!e.isIntersecting)return;
          [...e.target.querySelectorAll(".sq-rv")].forEach((el,i)=>{el.style.transitionDelay=i*90+"ms";el.classList.add("sq-show");});
        });
      },{threshold:0.1});
      obs.observe(ref.current);
      return ()=>obs.disconnect();
    },[]);
    return (
      <section ref={ref} style={{ background:"#FBF6EF", padding:"104px 44px 80px", borderBottom:"1px solid #E4DDD0" }}>
        <div style={{ maxWidth:1240, margin:"0 auto", display:"grid", gridTemplateColumns:"1fr 1fr", gap:72, alignItems:"center" }}>
          <div style={{ display:"flex", flexDirection:"column", gap:24 }}>
            <span className="sq-rv" style={bS.eye}>( Home Linen )</span>
            <h1 className="sq-rv" style={bS.h1}>
              Linens that make the table <em style={{fontStyle:"italic"}}>yours</em>.
            </h1>
            <p className="sq-rv" style={bS.sub}>
              Runners, tablecloths and napkins — chosen for how they feel at home, designed to last through every season and occasion.
            </p>
            <div className="sq-rv" style={{display:"flex",gap:16,flexWrap:"wrap"}}>
              <a href="#buy-catalog" style={bS.ctaPrimary}>Shop Home Linens</a>
              <a href="about.html" style={bS.ctaText}>Our story →</a>
            </div>
          </div>
          <div className="sq-rv" style={{ borderRadius:"20px 0 20px 0", overflow:"hidden", aspectRatio:"4/5" }}>
            <img src="../../assets/img/home.jpg" alt="Home table setting" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} />
          </div>
        </div>
      </section>
    );
  }

  const bS = {
    eye:        { fontFamily:"var(--font-ui)", fontSize:10, fontWeight:500, letterSpacing:"0.4em", textTransform:"uppercase", color:"#BE9A6E", display:"block" },
    h1:         { fontFamily:"'Audrey','Playfair Display','Cormorant Garamond',Georgia,serif", fontWeight:500, fontSize:"clamp(34px,4.5vw,56px)", lineHeight:1.08, color:"#221A12", margin:0 },
    sub:        { fontFamily:"var(--font-ui)", fontSize:15, lineHeight:1.78, color:"#6B4F3A", margin:0, maxWidth:"48ch" },
    ctaPrimary: { display:"inline-flex",alignItems:"center",textDecoration:"none", background:"#221A12", color:"#FBF6EF", fontFamily:"var(--font-ui)", fontWeight:600, fontSize:12, letterSpacing:"0.16em", textTransform:"uppercase", padding:"13px 28px", borderRadius:"12px 0 12px 0" },
    ctaText:    { display:"inline-flex",alignItems:"center",textDecoration:"none", fontFamily:"var(--font-ui)", fontWeight:500, fontSize:13, letterSpacing:"0.12em", textTransform:"uppercase", color:"#221A12", borderBottom:"1px solid #BE9A6E", paddingBottom:2, alignSelf:"center" },
  };

  function App() {
    const [cart, setCart] = useState({});
    const [favs, setFavs] = useState({});
    const [cartOpen, setCartOpen] = useState(false);

    useEffect(()=>{ window.lucide && window.lucide.createIcons(); });

    const add = p => {
      setCart(c=>{const cur=c[p.id];return{...c,[p.id]:{...p,qtyPrice:priceNum(p.price),qty:cur?cur.qty+1:1}};});
      const el=document.getElementById("sq-toast");if(!el)return;
      el.querySelector("span").textContent=`${p.name} added to cart`;
      el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2200);
    };
    const adjQty = (id,d) => setCart(c=>{const it=c[id];if(!it)return c;const q=it.qty+d;if(q<=0){const n={...c};delete n[id];return n;}return{...c,[id]:{...it,qty:q}};});
    const remove = id => setCart(c=>{const n={...c};delete n[id];return n;});
    const count  = Object.values(cart).reduce((s,i)=>s+i.qty,0);
    const go     = (id,href)=>{ window.location.href = href; };

    return (
      <React.Fragment>
        <SequinHeader active="buy" onNav={go} cartCount={count} onCart={()=>setCartOpen(true)} />
        <BuyHero />
        <div id="buy-catalog">
          <SequinCatalog filter="home" onFilter={()=>{}} favs={favs} onFav={id=>setFavs(s=>({...s,[id]:!s[id]}))} onAdd={add} />
        </div>
        <SequinFooter />
        <SequinCartDrawer open={cartOpen} items={cart} onClose={()=>setCartOpen(false)} onQty={adjQty} onRemove={remove} />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="sq-toast"><i data-lucide="check"></i><span>Added to cart</span></div>
<script>document.getElementById("root").after(document.getElementById("sq-toast"));</script>
</body>
</html>
