<!-- @dsCard group="Storefront" viewport="1440x900" name="Process — Sequin" subtitle="Process deep-dive: numbered steps and FAQ" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Our Process — Sequin Table Linen</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: #F7F2EA; }
  .sq-rv { opacity:0; transform:translateY(10px); transition:opacity 600ms cubic-bezier(.4,0,.2,1),transform 600ms cubic-bezier(.4,0,.2,1); }
  .sq-rv.sq-show { opacity:1; transform:translateY(0); }
  @media (prefers-reduced-motion:reduce){ .sq-rv{opacity:1;transform:none;transition:none;} }
  :focus-visible { outline: 1.5px solid #BE9A6E; outline-offset: 3px; }
  details summary { cursor: pointer; list-style: none; }
  details summary::-webkit-details-marker { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Process.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  function useReveal(ref) {
    useEffect(() => {
      if (!ref.current) return;
      const obs = new IntersectionObserver(entries=>{
        entries.forEach(e=>{
          if(!e.isIntersecting)return;
          [...e.target.querySelectorAll(".sq-rv")].forEach((el,i)=>{el.style.transitionDelay=i*90+"ms";el.classList.add("sq-show");});
        });
      },{threshold:0.1});
      obs.observe(ref.current);
      return ()=>obs.disconnect();
    },[]);
  }

  /* ── Process Masthead ── */
  function ProcessMasthead() {
    const ref = useRef(null);
    useReveal(ref);
    return (
      <section ref={ref} style={{ background:"#F7F2EA", padding:"96px 44px 80px" }}>
        <div style={{ maxWidth:1240, margin:"0 auto" }}>
          <span className="sq-rv" style={pS.eye}>( How We Work )</span>
          <h1 className="sq-rv" style={pS.mastH}>
            From our hands<br />to <em style={{fontStyle:"italic"}}>your</em> table.
          </h1>
          <p className="sq-rv" style={pS.mastSub}>
            Every Sequin linen follows the same four steps — whether it leaves our studio as a rental for your wedding reception or a runner you will keep for years.
          </p>
        </div>
      </section>
    );
  }

  /* ── Rental Timeline ── */
  function Timeline() {
    const ref = useRef(null);
    useReveal(ref);
    const steps = [
      { num:"01", head:"You choose.", body:"Browse the collection online or visit our Brooklyn studio by appointment. We can help match cloths to your colour story, table size and event type." },
      { num:"02", head:"We prepare.", body:"Your order is pressed, quality-checked and wrapped in-house — no outsourcing, no shortcuts. Rentals are inspected twice before dispatch." },
      { num:"03", head:"We deliver.", body:"Your linens arrive the day before your event. We offer timed delivery windows across the five boroughs and can arrange same-day for local orders." },
      { num:"04", head:"We collect.", body:"For rentals, we collect within 48 hours of your event. Leave the cloths loosely folded — we handle the rest. Home orders are yours to keep." },
    ];
    return (
      <section ref={ref} style={{ background:"#FBF6EF", padding:"80px 44px 104px", borderTop:"1px solid #E4DDD0" }}>
        <div style={{ maxWidth:1240, margin:"0 auto" }}>
          <span className="sq-rv" style={{ ...pS.eye, marginBottom:52, display:"block" }}>( Rental Timeline )</span>
          <div style={{ display:"flex", flexDirection:"column", gap:0 }}>
            {steps.map((s,i) => (
              <div key={s.num} className="sq-rv" style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:40, paddingBottom:i<steps.length-1?52:0, borderBottom:i<steps.length-1?"1px solid #E4DDD0":"none", marginBottom:i<steps.length-1?52:0 }}>
                <span style={{ fontFamily:"'Audrey','Playfair Display','Cormorant Garamond',Georgia,serif", fontWeight:500, fontSize:56, lineHeight:1, color:"#BE9A6E", opacity:0.55, letterSpacing:"-0.03em" }}>{s.num}</span>
                <div>
                  <h3 style={{ fontFamily:"'Audrey','Playfair Display','Cormorant Garamond',Georgia,serif", fontWeight:500, fontStyle:"italic", fontSize:26, color:"#221A12", margin:"0 0 12px" }}>{s.head}</h3>
                  <p style={{ fontFamily:"var(--font-ui)", fontSize:15, lineHeight:1.75, color:"#6B4F3A", margin:0, maxWidth:"58ch" }}>{s.body}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>
    );
  }

  /* ── FAQ ── */
  function FAQ() {
    const ref = useRef(null);
    useReveal(ref);
    const faqs = [
      { q:"How far in advance should I book?", a:"We recommend booking at least four weeks in advance for events, though we often accommodate shorter windows. Contact us and we will do our best." },
      { q:"Can I see the linens before I commit?", a:"Yes. Visit our Brooklyn studio by appointment and we will pull the pieces you are considering so you can feel the weight and check the colour in person." },
      { q:"What if a rental item is damaged?", a:"We understand that events happen. Minor staining is covered; significant damage is assessed at return. We will always contact you before any charges are applied." },
      { q:"Do you deliver outside New York?", a:"Currently we deliver across the five boroughs and close New Jersey. For events further out, contact us — we assess on a case-by-case basis." },
      { q:"Are home linen purchases returnable?", a:"Yes — within 14 days of delivery, unwashed and in original packaging. See our Shipping & Returns page for full details." },
    ];
    return (
      <section ref={ref} style={{ background:"#221A12", padding:"104px 44px" }} data-theme="noir">
        <div style={{ maxWidth:900, margin:"0 auto" }}>
          <span className="sq-rv" style={{ ...pS.eye, color:"#BE9A6E", display:"block", marginBottom:52 }}>( FAQ )</span>
          <div style={{ display:"flex", flexDirection:"column", gap:0 }}>
            {faqs.map((f,i) => (
              <div key={i} className="sq-rv" style={{ borderTop:"1px solid rgba(190,154,110,.2)", paddingTop:28, paddingBottom:28 }}>
                <details>
                  <summary style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }}>
                    <span style={{ fontFamily:"'Audrey','Playfair Display','Cormorant Garamond',Georgia,serif", fontWeight:500, fontSize:20, color:"#FBF6EF" }}>{f.q}</span>
                    <i data-lucide="plus" style={{width:18,height:18,color:"#BE9A6E",flexShrink:0,marginLeft:24}}></i>
                  </summary>
                  <p style={{ fontFamily:"var(--font-ui)", fontSize:14.5, lineHeight:1.75, color:"#9A8A75", margin:"18px 0 0", maxWidth:"64ch" }}>{f.a}</p>
                </details>
              </div>
            ))}
            <div style={{ borderTop:"1px solid rgba(190,154,110,.2)" }} />
          </div>
        </div>
      </section>
    );
  }

  const pS = {
    eye:    { fontFamily:"var(--font-ui)", fontSize:10, fontWeight:500, letterSpacing:"0.4em", textTransform:"uppercase", color:"#BE9A6E" },
    mastH:  { fontFamily:"'Audrey','Playfair Display','Cormorant Garamond',Georgia,serif", fontWeight:500, fontSize:"clamp(38px,5vw,64px)", lineHeight:1.08, letterSpacing:"-0.01em", color:"#221A12", margin:"16px 0 24px" },
    mastSub:{ fontFamily:"var(--font-ui)", fontSize:15, lineHeight:1.78, color:"#6B4F3A", margin:0, maxWidth:"52ch" },
  };

  function App() {
    useEffect(()=>{ window.lucide && window.lucide.createIcons(); });
    const go = (id,href)=>{ window.location.href = href; };
    return (
      <React.Fragment>
        <SequinHeader active="process" onNav={go} />
        <ProcessMasthead />
        <SequinProcess />
        <Timeline />
        <FAQ />
        <SequinFooter />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
