<!-- @dsCard group="Storefront" viewport="1440x900" name="Rent — Sequin" subtitle="Rental lane landing: hero, catalog, process" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rent — Sequin Table Linen</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: #F7F2EA; }
  .sq-rv { opacity:0; transform:translateY(10px); transition:opacity 600ms cubic-bezier(.4,0,.2,1),transform 600ms cubic-bezier(.4,0,.2,1); }
  .sq-rv.sq-show { opacity:1; transform:translateY(0); }
  @media (prefers-reduced-motion:reduce){ .sq-rv{opacity:1;transform:none;transition:none;} }
  :focus-visible { outline: 1.5px solid #BE9A6E; outline-offset: 3px; }
  #sq-toast {
    position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(120%);
    z-index:120;background:#221A12;color:#FBF6EF;padding:13px 22px;
    border-radius:var(--radius-pill);box-shadow:var(--shadow-4);
    display:flex;align-items:center;gap:10px;font-size:13px;letter-spacing:.04em;
    border:1px solid rgba(216,180,132,.55);transition:transform .45s cubic-bezier(.4,0,.2,1);
  }
  #sq-toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Catalog.jsx"></script>
<script type="text/babel" src="Process.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="CartDrawer.jsx"></script>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const priceNum = s => parseInt(String(s).replace(/[^0-9]/g,""),10)||0;

  function RentHero() {
    const ref = useRef(null);
    useEffect(() => {
      if (!ref.current) return;
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (!e.isIntersecting) return;
          [...e.target.querySelectorAll(".sq-rv")].forEach((el,i)=>{el.style.transitionDelay=i*90+"ms";el.classList.add("sq-show");});
        });
      }, {threshold:0.1});
      obs.observe(ref.current);
      return ()=>obs.disconnect();
    },[]);
    return (
      <section ref={ref} style={{ background:"#221A12", position:"relative", overflow:"hidden", minHeight:480, display:"flex", alignItems:"center" }} data-theme="noir">
        <div style={{ position:"absolute", inset:0, opacity:0.18 }}>
          <img src="../../assets/img/rentals.jpg" alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} />
        </div>
        <div style={{ position:"relative", zIndex:2, maxWidth:1240, margin:"0 auto", padding:"104px 44px", width:"100%", boxSizing:"border-box" }}>
          <span className="sq-rv" style={rS.eye}>( Rentals )</span>
          <h1 className="sq-rv" style={rS.h1}>
            Statement linens for every<br /><em style={{fontStyle:"italic",color:"#BE9A6E"}}>occasion</em>.
          </h1>
          <p className="sq-rv" style={rS.sub}>Delivered, pressed and ready to dress — from intimate dinners to wedding receptions.</p>
          <div className="sq-rv" style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:8}}>
            <a href="#rental-catalog" style={rS.ctaGold}>Browse Rentals</a>
            <a href="process.html" style={rS.ctaOut}>How It Works →</a>
          </div>
        </div>
      </section>
    );
  }

  const rS = {
    eye:     { fontFamily:"var(--font-ui)", fontSize:10, fontWeight:500, letterSpacing:"0.4em", textTransform:"uppercase", color:"#BE9A6E", display:"block", marginBottom:20 },
    h1:      { fontFamily:"'Audrey','Playfair Display','Cormorant Garamond',Georgia,serif", fontWeight:500, fontSize:"clamp(36px,5vw,60px)", lineHeight:1.08, color:"#FBF6EF", margin:"0 0 18px" },
    sub:     { fontFamily:"var(--font-ui)", fontSize:15, lineHeight:1.7, color:"#9A8A75", margin:"0 0 28px", maxWidth:"48ch" },
    ctaGold: { display:"inline-flex",alignItems:"center",textDecoration:"none", background:"linear-gradient(135deg,#BE9A6E,#D8B484,#BE9A6E)", color:"#221A12", fontFamily:"var(--font-ui)", fontWeight:600, fontSize:12, letterSpacing:"0.16em", textTransform:"uppercase", padding:"13px 28px", borderRadius:"12px 0 12px 0" },
    ctaOut:  { display:"inline-flex",alignItems:"center",textDecoration:"none", background:"transparent", color:"#FBF6EF", fontFamily:"var(--font-ui)", fontWeight:500, fontSize:12, letterSpacing:"0.16em", textTransform:"uppercase", padding:"12px 26px", border:"1px solid rgba(190,154,110,.55)", borderRadius:"12px 0 12px 0" },
  };

  function App() {
    const [cart, setCart] = useState({});
    const [favs, setFavs] = useState({});
    const [cartOpen, setCartOpen] = useState(false);

    useEffect(()=>{ window.lucide && window.lucide.createIcons(); });

    const add = p => {
      setCart(c=>{const cur=c[p.id];return{...c,[p.id]:{...p,qtyPrice:priceNum(p.price),qty:cur?cur.qty+1:1}};});
      const el=document.getElementById("sq-toast");if(!el)return;
      el.querySelector("span").textContent=`${p.name} added to cart`;
      el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2200);
    };
    const adjQty = (id,d) => setCart(c=>{const it=c[id];if(!it)return c;const q=it.qty+d;if(q<=0){const n={...c};delete n[id];return n;}return{...c,[id]:{...it,qty:q}};});
    const remove = id => setCart(c=>{const n={...c};delete n[id];return n;});
    const count  = Object.values(cart).reduce((s,i)=>s+i.qty,0);
    const go     = (id,href)=>{ window.location.href = href; };

    return (
      <React.Fragment>
        <SequinHeader active="rent" onNav={go} cartCount={count} onCart={()=>setCartOpen(true)} />
        <RentHero />
        <div id="rental-catalog" style={{paddingTop:8}}>
          <SequinCatalog filter="rental" onFilter={()=>{}} favs={favs} onFav={id=>setFavs(s=>({...s,[id]:!s[id]}))} onAdd={add} />
        </div>
        <SequinProcess />
        <SequinFooter />
        <SequinCartDrawer open={cartOpen} items={cart} onClose={()=>setCartOpen(false)} onQty={adjQty} onRemove={remove} />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="sq-toast"><i data-lucide="check"></i><span>Added to cart</span></div>
<script>document.getElementById("root").after(document.getElementById("sq-toast"));</script>
</body>
</html>
