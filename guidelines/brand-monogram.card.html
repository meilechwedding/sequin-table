<!-- @dsCard group="Brand" viewport="700x220" name="Monogram & Wordmark" subtitle="The ST monogram and the Sequin lockup" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--grad-noir); padding: 0; font-family: var(--font-ui);
         display:flex; align-items:center; gap: 0; }
  .pane { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; height:220px; gap:14px; }
  .ring { width: 92px; height: 92px; border-radius: 50%; display:flex; align-items:center; justify-content:center;
          border: 1.5px solid var(--gold-400); box-shadow: var(--glow-gold-soft), inset 0 0 22px rgba(201,168,106,.18); }
  .ring span { font-family: var(--font-serif); font-weight: 500; font-size: 38px; letter-spacing:.02em;
               background: var(--foil-gold); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sep { width:1px; height:130px; background: var(--border); }
  .word { font-family: var(--font-display); font-weight: 300; font-size: 46px; letter-spacing:.34em;
          text-transform: uppercase; color: var(--cream-50); padding-left:.34em; }
  .tag { font-size: 10.5px; letter-spacing:.3em; text-transform:uppercase; color: var(--gold-300); }
</style>
</head>
<body data-theme="noir">
  <div class="pane">
    <div class="ring"><span>ST</span></div>
    <div class="tag">Monogram</div>
  </div>
  <div class="sep"></div>
  <div class="pane">
    <div class="word">Sequin</div>
    <div class="tag">Est. · Brooklyn, NY</div>
  </div>
</body>
</html>
