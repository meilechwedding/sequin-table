<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="8px soft grid — generous by default" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-ui); color: var(--text); }
  .row { display:flex; align-items:flex-end; gap: 14px; }
  .item { text-align:center; }
  .bar { background: var(--foil-gold-soft); border-radius: var(--radius-xs); box-shadow: var(--shadow-1); }
  .item b { display:block; font-size: 11px; margin-top: 8px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .item span { font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:4px"></div><b>1</b><span>4</span></div>
    <div class="item"><div class="bar" style="width:8px;height:8px"></div><b>2</b><span>8</span></div>
    <div class="item"><div class="bar" style="width:12px;height:12px"></div><b>3</b><span>12</span></div>
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><b>4</b><span>16</span></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><b>5</b><span>24</span></div>
    <div class="item"><div class="bar" style="width:32px;height:32px"></div><b>6</b><span>32</span></div>
    <div class="item"><div class="bar" style="width:48px;height:48px"></div><b>7</b><span>48</span></div>
    <div class="item"><div class="bar" style="width:64px;height:64px"></div><b>8</b><span>64</span></div>
  </div>
</body>
</html>
