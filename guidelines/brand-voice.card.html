<!-- @dsCard group="Brand" viewport="700x210" name="Voice & Tone" subtitle="Gracious, elevated, hospitable — never salesy" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-ui); color: var(--text); display:flex; gap:20px; }
  .col { flex:1; }
  .h { font-size: 11px; letter-spacing:.18em; text-transform:uppercase; margin-bottom:12px; }
  .do .h { color: var(--sage-600); }
  .dont .h { color: var(--bordeaux-500); }
  .line { font-size: 14px; line-height:1.5; padding: 7px 0; border-bottom: 1px solid var(--hairline); color: var(--text-soft); }
  .line:last-child { border-bottom:0; }
  .line.q { font-family: var(--font-serif); font-style:italic; font-size:17px; color: var(--text); }
  .strike { color: var(--text-faint); text-decoration: line-through; }
</style>
</head>
<body>
  <div class="col do">
    <div class="h">✦ On brand</div>
    <div class="line q">"Bringing sophistication to every celebration."</div>
    <div class="line">Explore Rentals · Shop Home Linens</div>
    <div class="line">Title Case headlines · CAPS eyebrows</div>
  </div>
  <div class="col dont">
    <div class="h">✕ Off brand</div>
    <div class="line strike">BUY NOW!! Lowest prices 🎉🔥</div>
    <div class="line strike">Cheap tablecloths on sale today</div>
    <div class="line strike">cool stuff for ur party</div>
  </div>
</body>
</html>
