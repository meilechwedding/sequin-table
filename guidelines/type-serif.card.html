<!-- @dsCard group="Type" viewport="700x200" name="Editorial Serif — Cormorant" subtitle="High-contrast italic for pull-quotes & flourishes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 30px; font-family: var(--font-ui); color: var(--text); }
  .q { font-family: var(--font-serif); font-style: italic; font-weight: 500; font-size: 40px;
       line-height: 1.1; color: var(--text); margin: 0; }
  .q b { font-style: normal; font-weight: 600; color: var(--accent-text); }
  .by { margin-top: 16px; font-size: 11px; letter-spacing:.22em; text-transform:uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <p class="q">A table is the first thing<br>a guest <b>remembers</b>.</p>
  <div class="by">Cormorant Garamond · Italic 500</div>
</body>
</html>
