<!-- @dsCard group="Effects" viewport="700x200" name="Gold Foil & Sequin Shimmer" subtitle="Metallic foil text + the signature shimmer sweep" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--grad-noir); padding: 34px 30px; font-family: var(--font-ui); }
  .big { font-family: var(--font-display); font-weight: 300; font-size: 64px; letter-spacing:.06em; margin:0; line-height:1; }
  .row { display:flex; gap: 14px; margin-top: 22px; align-items:center; }
  .badge { padding: 9px 20px; border-radius: var(--radius-pill); font-size: 12px; font-weight:600;
           letter-spacing:.16em; text-transform:uppercase; color: var(--espresso-900); background: var(--foil-gold);
           box-shadow: var(--bevel-gold), var(--glow-gold-soft); }
  .note { color: var(--gold-300); font-size: 12px; letter-spacing:.04em; }
</style>
</head>
<body data-theme="noir">
  <p class="big foil-text foil-text--animated">Sequin</p>
  <div class="row">
    <span class="badge sequin-shimmer">Shimmer</span>
    <span class="note">.foil-text · .foil-text--animated · .sequin-shimmer</span>
  </div>
</body>
</html>
