<!-- @dsCard group="Effects" viewport="700x230" name="Glass & Gold Glow" subtitle="Frosted warm glass on photography · gold glow accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ui); }
  .stage { position: relative; height: 230px; background: url("../assets/img/hero.jpg") center/cover; overflow:hidden; }
  .stage::after { content:""; position:absolute; inset:0; background: var(--grad-veil); }
  .glass { position:absolute; left: 30px; top: 50%; transform: translateY(-50%);
           width: 260px; padding: 20px 22px; border-radius: var(--radius-lg); z-index:2; }
  .glass .eyebrow { font-size: 11px; color: var(--gold-300); }
  .glass h4 { margin:.3em 0 .2em; font-size: 24px; color: #fff; }
  .glass p { margin:0; font-size: 12.5px; color: rgba(255,255,255,.85); }
  .pill { position:absolute; right: 30px; top: 30px; z-index:2; padding: 10px 18px; border-radius: var(--radius-pill);
          background: var(--foil-gold); color: var(--espresso-900); font-size: 12px; font-weight:600;
          letter-spacing:.14em; text-transform:uppercase; box-shadow: var(--glow-gold), var(--bevel-gold); }
</style>
</head>
<body>
  <div class="stage" data-theme="noir">
    <div class="glass">
      <div class="eyebrow">Event Rentals</div>
      <h4 class="display">Frosted Glass</h4>
      <p>Warm, creamy backdrop-blur over real tablescape photography.</p>
    </div>
    <div class="pill">Gold Glow</div>
  </div>
</body>
</html>
