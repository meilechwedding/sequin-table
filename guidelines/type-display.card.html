<!-- @dsCard group="Type" viewport="700x230" name="Display — Jost" subtitle="Geometric deco face (Audrey substitute), set light & tracked" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 26px; font-family: var(--font-ui); color: var(--text); }
  .stack > div { display:flex; align-items:baseline; gap:16px; border-bottom:1px solid var(--hairline); padding:10px 0; }
  .stack > div:last-child { border-bottom: 0; }
  .lab { width: 92px; font-size: 11px; letter-spacing:.16em; text-transform:uppercase; color: var(--text-faint); flex:none; }
  .d { font-family: var(--font-display); font-weight: 300; letter-spacing: .06em; line-height: 1; color: var(--text); }
</style>
</head>
<body>
  <div class="stack">
    <div><span class="lab">5xl / 300</span><span class="d" style="font-size:54px">Celebration</span></div>
    <div><span class="lab">3xl / 300</span><span class="d" style="font-size:38px">Set the Table</span></div>
    <div><span class="lab">xl / 400</span><span class="d" style="font-size:26px; font-weight:400">Upscale Table Linen</span></div>
    <div><span class="lab">lg / 500</span><span class="d" style="font-size:20px; font-weight:500">Events &amp; Home</span></div>
  </div>
</body>
</html>
