<!-- @dsCard group="Type" viewport="700x180" name="Eyebrows, Body & UI" subtitle="Tracked caps · readable body · UI labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 26px; font-family: var(--font-ui); color: var(--text); }
  .col { display:flex; gap: 40px; }
  .eyebrow { font-size: 12px; }
  .b { max-width: 42ch; font-size: 15px; line-height: 1.65; color: var(--text-soft); margin:.6em 0 0; }
  .labels { display:flex; gap:10px; margin-top: 4px; }
  .lbl { font-size: 11px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color: var(--text-muted); }
  .widest { letter-spacing:.32em; }
</style>
</head>
<body>
  <div>
    <div class="eyebrow">Event Linen Rentals</div>
    <p class="b">Sequin brings sophistication and style to every celebration — curated linens for
      gatherings at home and grand occasions alike.</p>
    <div class="labels">
      <span class="lbl">Rentals</span><span class="lbl">Home</span><span class="lbl widest">ST · Monogram</span>
    </div>
  </div>
</body>
</html>
