<!-- @dsCard group="Components" viewport="700x300" name="Forms — Inputs & Fields" subtitle="Linen-inset inputs, labels, hints & errors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 26px; font-family: var(--font-ui); color: var(--text); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 22px 28px; max-width: 620px; }
  .full { grid-column: 1 / -1; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Field, Button } = window.SequinDesignSystem_ec3cc5;
    function Demo() {
      return (
        <div className="grid">
          <Field label="Search" htmlFor="s">
            <Input id="s" placeholder="Search linens" icon={<i data-lucide="search"></i>} />
          </Field>
          <Field label="Event date" required htmlFor="d">
            <Input id="d" type="text" placeholder="MM / DD / YYYY" icon={<i data-lucide="calendar"></i>} />
          </Field>
          <Field className="full" label="Email" htmlFor="e" hint="Occasional table inspiration — never spam.">
            <Input id="e" type="email" placeholder="you@email.com" size="lg"
              trailing={<Button size="sm">Subscribe</Button>} />
          </Field>
          <Field label="Guests" htmlFor="g" error="Please enter a number">
            <Input id="g" invalid placeholder="0" icon={<i data-lucide="users"></i>} />
          </Field>
          <Field label="Promo code" htmlFor="p">
            <Input id="p" placeholder="SEQUIN" />
          </Field>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
  </script>
</body>
</html>
